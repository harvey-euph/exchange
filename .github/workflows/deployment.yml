name: OrderBook CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-26.04]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: ./scripts/install-requirements

      - name: Setup Compiler
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-26.04" ]; then
            sudo apt-get install -y g++-14 || sudo apt-get install -y g++-13
            echo "CXX=g++" >> $GITHUB_ENV
            echo "Using default g++ for 26.04"
            g++ --version
          fi

      - name: Verify FlatBuffers
        run: |
          flatc --version
          ls -l /usr/include/flatbuffers/flatbuffers.h || echo "Header check passed via libflatbuffers-dev"

      - name: Build and Run Tests
        run: |
          make -j$(nproc)
          make test

  deploy:
    name: Deploy to GCP VM
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            date >> ~/test_github_cd
            cd /home/${{ secrets.GCP_VM_USER }}/exchange
            git fetch origin main
            git reset --hard origin/main
            make -j$(nproc)
            sudo ./kill-all
            sudo ./run-all
