name: OrderBook CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            software-properties-common \
            libgtest-dev \
            googletest \
            libflatbuffers-dev \
            flatbuffers-compiler \
            pkg-config

      - name: Install g++ (for Ubuntu 22.04 / 24.04)
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            sudo apt-get install -y g++-11
            echo "CXX=g++-11" >> $GITHUB_ENV
          else
            sudo apt-get install -y g++-13
            echo "CXX=g++-13" >> $GITHUB_ENV
          fi
          $CXX --version

      - name: Verify FlatBuffers
        run: |
          flatc --version
          pkg-config --cflags flatbuffers || echo "No pkg-config for flatbuffers"

      - name: Generate FlatBuffers
        run: make fbs

      - name: Build and Run Tests
        run: |
          make clean
          make test

  quick-test:
    name: Quick Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            g++ \
            libgtest-dev \
            googletest \
            libflatbuffers-dev \
            flatbuffers-compiler

      - name: Generate FlatBuffers & Run Tests
        run: |
          make clean
          make test