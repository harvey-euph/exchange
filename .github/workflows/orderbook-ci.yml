name: OrderBook CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-26.04]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            software-properties-common \
            libgtest-dev \
            googletest \
            libboost-all-dev \
            libflatbuffers-dev \
            flatbuffers-compiler \
            pkg-config \
            libpq-dev \
            libpqxx-dev

      - name: Setup Compiler
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-26.04" ]; then
            sudo apt-get install -y g++-14 || sudo apt-get install -y g++-13
            echo "CXX=g++" >> $GITHUB_ENV
            echo "Using default g++ for 26.04"
            g++ --version
          fi

      - name: Verify FlatBuffers
        run: |
          flatc --version
          ls -l /usr/include/flatbuffers/flatbuffers.h || echo "Header check passed via libflatbuffers-dev"

      - name: Generate FlatBuffers
        run: make fbs

      - name: Build and Run Tests
        run: |
          make clean
          make test


