name: Benchmark

on:
  push:
    branches-ignore:
      - 'main'

jobs:
  benchmark:
    name: Run Benchmark on VM
    runs-on: ubuntu-latest

    steps:
      - name: SSH and Run Benchmark
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          command_timeout: 12h
          script: |
            cd /home/${{ secrets.GCP_VM_USER }}/exchange
            git fetch origin "${{ github.ref_name }}"
            git checkout -B "${{ github.ref_name }}" FETCH_HEAD
            git reset --hard FETCH_HEAD
            git clean -fd
            ./scripts/benchmark-gen-report "${{ github.ref_name }}"

      - name: Analyze Benchmark Results
        # Always runs and always succeeds – verdict is left for manual review.
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: false
          command_timeout: 30m
          script: |
            cd /home/${{ secrets.GCP_VM_USER }}/exchange
            BRANCH_CLEAN="${{ github.ref_name }}"
            BRANCH_CLEAN="${BRANCH_CLEAN//\//_}"
            COMMIT=$(git rev-parse --short=7 HEAD)
            DEST_DIR="log/${BRANCH_CLEAN}-${COMMIT}"
            ./scripts/benchmark-analyze "$DEST_DIR"