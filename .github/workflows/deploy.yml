name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Run Tests First
    # Wait, we can reuse the existing workflow or trigger this in parallel
    # Let's keep it clean: runs after build & test verification is complete on main
    runs-on: ubuntu-26.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential software-properties-common pkg-config \
            libgtest-dev googletest \
            libboost-all-dev \
            libflatbuffers-dev flatbuffers-compiler \
            libpq-dev libpqxx-dev \
            systemtap-sdt-dev \
            nodejs npm tmux

      - name: Setup Compiler
        run: |
          sudo apt-get install -y g++-14 || sudo apt-get install -y g++-13
          echo "CXX=g++" >> $GITHUB_ENV
          g++ --version

      - name: Generate FlatBuffers
        run: make fbs

      - name: Build and Run Tests
        run: |
          make clean
          make test

  deploy:
    name: Deploy to GCP VM
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            date >> ~/test_github_cd
            cd /home/${{ secrets.GCP_VM_USER }}/exchange
            git fetch origin main
            git reset --hard origin/main
            make -j$(nproc)
            sudo ./kill-all
            sudo ./run-all
